<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #2a2a2a;
      --border-focus: #6c63ff;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #6c63ff;
      --accent-hover: #7b72ff;
      --error: #f87171;
      --success: #4ade80;
      --input-bg: #111;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 20px; height: 20px; fill: white; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }
    .subtitle a:hover { text-decoration: underline; }

    .field {
      margin-bottom: 1.1rem;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error);
    }
    .alert.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>

    <h1>Create an account</h1>
    <p class="subtitle">Already have one? <a href="/signup.html">Sign in</a></p>

    <div class="alert error" id="alert-error"></div>
    <div class="alert success" id="alert-success"></div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter a username" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Create a password" autocomplete="new-password"/>
    </div>

    <button class="btn" id="submit-btn" onclick="handleRegister()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-text">Create Account</span>
    </button>
  </div>

  <script>
    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('submit-btn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      const errEl = document.getElementById('alert-error');
      const okEl = document.getElementById('alert-success');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (!username || !email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Creating account...';

      try {
        const res = await fetch('/v1/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          okEl.textContent = 'Account created! Redirecting...';
          okEl.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard.html', 1000);
        } else {
          errEl.textContent = data.err || 'Something went wrong.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Could not reach the server. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Create Account';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
