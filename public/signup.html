<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #2a2a2a;
      --border-focus: #6c63ff;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #6c63ff;
      --accent-hover: #7b72ff;
      --error: #f87171;
      --success: #4ade80;
      --input-bg: #111;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }
    .subtitle a:hover { text-decoration: underline; }

    .session-banner {
      background: rgba(108, 99, 255, 0.08);
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #a89fff;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .session-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error);
    }
    .alert.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">No account yet? <a href="/login.html">Create one</a></p>

    <div class="session-banner" id="session-msg" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Your session expired. Please sign in again.
    </div>

    <div class="alert error" id="alert-error"></div>
    <div class="alert success" id="alert-success"></div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Your username" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" autocomplete="current-password"/>
    </div>

    <button class="btn" id="submit-btn" onclick="handleSignin()">
      <span class="spinner" id="spinner"></span>
      <span id="btn-text">Sign In</span>
    </button>
  </div>

  <script>
    // Show "session expired" banner if redirected due to invalid token (462)
    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'expired') {
      document.getElementById('session-msg').style.display = 'flex';
    }

    async function handleSignin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('submit-btn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      const errEl = document.getElementById('alert-error');
      const okEl = document.getElementById('alert-success');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (!username || !password) {
        errEl.textContent = 'Please enter your username and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Signing in...';

      try {
        const res = await fetch('/v1/signup', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          okEl.textContent = 'Signed in! Redirecting...';
          okEl.style.display = 'block';
          setTimeout(() => window.location.href = '/', 1000);
        } else if (res.status === 400) {
          errEl.textContent = "User doesn't exist. Need an account?";
          errEl.style.display = 'block';
        } else if (res.status === 401) {
          errEl.textContent = 'Incorrect password. Please try again.';
          errEl.style.display = 'block';
        } else {
          errEl.textContent = data.err || 'Something went wrong.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Could not reach the server. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Sign In';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignin();
    });
  </script>
</body>
</html>
