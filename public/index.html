<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --border-hover: #3a3a3a;
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #999;
      --accent: #6c63ff;
      --accent-hover: #7b72ff;
      --accent-dim: rgba(108,99,255,0.12);
      --accent-dim2: rgba(108,99,255,0.2);
      --error: #f87171;
      --success: #4ade80;
      --done-text: #555;
      --input-bg: #111;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
    }

    #page-loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }
    #page-loader .ring {
      width: 40px;
      height: 40px;
      border: 2.5px solid #2a2a2a;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #page-loader p {
      font-size: 13px;
      color: var(--muted);
    }
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 14px; height: 14px; }

    .app-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      font-size: 13px;
      color: var(--muted2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted2);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-title {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .page-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 500;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .add-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .add-input::placeholder { color: var(--muted); }

    .btn-add {
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-add:hover { background: var(--accent-hover); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-add svg { width: 14px; height: 14px; }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }
    .task-item:hover { border-color: var(--border-hover); }
    .task-item.done { opacity: 0.5; }

    .check-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hover);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .check-btn:hover { border-color: var(--accent); }
    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-btn svg { width: 10px; height: 10px; display: none; }
    .check-btn.checked svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .task-text-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; }

    .save-btn {
      padding: 4px 10px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .save-btn:hover { background: var(--accent-hover); }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border-radius: 12px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-icon svg { width: 22px; height: 22px; color: var(--accent); }
    .empty-state p { font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
    .toast.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }

    .spinner-sm {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-wrap {
      display: flex;
      justify-content: center;
      padding: 3rem 0;
    }
    .loader-ring {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

  <div id="page-loader">
    <div class="ring"></div>
    <p>Loading...</p>
  </div>

  <div id="app">
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <span class="app-name">Taskr</span>
    </div>
    <div class="header-right">
      <span class="user-badge" id="user-display">...</span>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <h1 class="page-title">My tasks</h1>
    <p class="page-sub" id="date-sub"></p>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value accent" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Done today</div>
        <div class="stat-value success" id="stat-done">0</div>
      </div>
    </div>

    <div class="add-form">
      <input class="add-input" id="new-task-input" type="text" placeholder="Add a new task..." maxlength="200"/>
      <button class="btn-add" id="add-btn" onclick="addTask()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>

    <div class="section-label" id="list-label">Tasks</div>

    <div class="task-list" id="task-list">
      <div class="loader-wrap"><div class="loader-ring"></div></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  </div>

  <script>
    let tasks = [];
    let doneCount = 0;

    const dateEl = document.getElementById('date-sub');
    dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    async function init() {
      try {
        const res = await fetch('/v1/tasks', { credentials: 'include' });
        if (res.status === 461) return window.location.href = '/login.html';
        if (res.status === 462) return window.location.href = '/signin.html?reason=expired';
        const data = await res.json();
        tasks = data.taskFound || [];
        renderTasks();
        updateStats();
        document.getElementById('page-loader').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      } catch (e) {
        showToast('Could not load tasks', 'error');
        document.getElementById('task-list').innerHTML = '';
        document.getElementById('page-loader').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      }
    }

    function updateStats() {
      const pending = tasks.filter(t => !t.isDone).length;
      document.getElementById('stat-total').textContent = tasks.length + doneCount;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-done').textContent = doneCount;
      const label = document.getElementById('list-label');
      label.textContent = pending === 0 ? 'All clear' : `${pending} remaining`;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const pending = tasks.filter(t => !t.isDone);
      if (pending.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
            </div>
            <p>No pending tasks — add something above</p>
          </div>`;
        return;
      }
      list.innerHTML = pending.map(t => taskHTML(t)).join('');
    }

    function taskHTML(t) {
      return `<div class="task-item" id="task-${t.id}">
        <button class="check-btn" onclick="markDone('${t.id}', '${escHtml(t.task)}')">
          <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>
        </button>
        <span class="task-text" id="text-${t.id}">${escHtml(t.task)}</span>
        <div class="task-actions">
          <button class="icon-btn" onclick="startEdit('${t.id}', '${escHtml(t.task)}')" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
      </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function startEdit(id, currentText) {
      const item = document.getElementById('task-' + id);
      const textEl = document.getElementById('text-' + id);
      textEl.outerHTML = `<input class="task-text-input" id="edit-${id}" value="${escHtml(currentText)}" maxlength="200"/>`;
      const actions = item.querySelector('.task-actions');
      actions.innerHTML = `
        <button class="save-btn" onclick="saveEdit('${id}')">Save</button>
        <button class="icon-btn" onclick="cancelEdit('${id}', '${escHtml(currentText)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      document.getElementById('edit-' + id).focus();
      document.getElementById('edit-' + id).addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(id);
        if (e.key === 'Escape') cancelEdit(id, currentText);
      });
    }

    function cancelEdit(id, original) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const item = document.getElementById('task-' + id);
      const inputEl = document.getElementById('edit-' + id);
      inputEl.outerHTML = `<span class="task-text" id="text-${id}">${escHtml(original)}</span>`;
      const actions = item.querySelector('.task-actions');
      actions.innerHTML = `<button class="icon-btn" onclick="startEdit('${id}', '${escHtml(original)}')" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>`;
    }

    async function saveEdit(id) {
      const inputEl = document.getElementById('edit-' + id);
      if (!inputEl) return;
      const newText = inputEl.value.trim();
      if (!newText) { showToast('Task cannot be empty', 'error'); return; }
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      try {
        const res = await fetch('/v1/tasks', {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, task: newText, isDone: false })
        });
        const data = await res.json();
        if (res.ok) {
          task.task = data.task;
          cancelEdit(id, data.task);
          showToast('Task updated', 'success');
        } else {
          showToast(data.err || 'Update failed', 'error');
        }
      } catch (e) {
        showToast('Could not reach server', 'error');
      }
    }

    async function markDone(id, taskText) {
      const btn = document.querySelector(`#task-${id} .check-btn`);
      if (btn) btn.classList.add('checked');
      setTimeout(async () => {
        try {
          const res = await fetch('/v1/tasks', {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, task: taskText, isDone: true })
          });
          if (res.ok) {
            tasks = tasks.filter(t => t.id !== id);
            doneCount++;
            renderTasks();
            updateStats();
            showToast('Task completed', 'success');
          } else {
            showToast('Could not mark done', 'error');
            if (btn) btn.classList.remove('checked');
          }
        } catch (e) {
          showToast('Could not reach server', 'error');
          if (btn) btn.classList.remove('checked');
        }
      }, 300);
    }

    async function addTask() {
      const input = document.getElementById('new-task-input');
      const btn = document.getElementById('add-btn');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner-sm"></div>';

      try {
        const res = await fetch('/v1/tasks', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task: text })
        });
        const data = await res.json();
        if (res.status === 201) {
          tasks.unshift({ id: data.id, task: data.task, isDone: false });
          input.value = '';
          renderTasks();
          updateStats();
          showToast('Task added', 'success');
        } else {
          showToast(data.err || 'Failed to add task', 'error');
        }
      } catch (e) {
        showToast('Could not reach server', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add`;
      }
    }

    document.getElementById('new-task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    async function logout() {
      document.cookie = 'uid=; Max-Age=0; path=/';
      window.location.href = '/signup.html';
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    async function loadUsername() {
      const cookies = document.cookie.split(';');
      const uid = cookies.find(c => c.trim().startsWith('uid='));
      if (uid) {
        try {
          const token = uid.split('=')[1];
          const payload = JSON.parse(atob(token.split('.')[1]));
          document.getElementById('user-display').textContent = payload.username || payload.user || 'User';
        } catch(e) {
          document.getElementById('user-display').textContent = 'User';
        }
      }
    }

    loadUsername();
    init();
  </script>
</body>
</html>
